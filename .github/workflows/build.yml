name: Build Docker image

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t tracula-neurodesk .

      - name: Verify binaries
        run: |
          docker run --rm --entrypoint bash tracula-neurodesk -c '
            echo "=== FreeSurfer ==="
            echo "FREESURFER_HOME=$FREESURFER_HOME"
            which recon-all && recon-all --version 2>/dev/null | head -1
            which trac-all

            echo ""
            echo "=== FSL ==="
            echo "FSLDIR=$FSLDIR"
            which bedpostx
            cat $FSLDIR/etc/fslversion

            echo ""
            echo "=== Python ==="
            python3 -c "import bids; print(\"pybids\", bids.__version__)"
            python3 -c "import pandas; print(\"pandas\", pandas.__version__)"
            python3 -c "import nibabel; print(\"nibabel\", nibabel.__version__)"
          '
